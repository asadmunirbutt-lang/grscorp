function toTitleCase(str) {
    return str.replace(/-/g, ' ').replace(/\w/g, function(c) { return c.toUpperCase(); });
}

function filterBlogs() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = blogSlugs.filter(s => s.toLowerCase().includes(term));
    renderBlogs(filtered);
}

function renderBlogs(slugs) {
    const container = document.getElementById('blogGrid');
    container.innerHTML = '';
    slugs.forEach(slug => {
        const card = document.createElement('a');
        card.href = '/posts/' + slug;
        card.className = 'blog-card';
        card.innerHTML = '<div class="blog-card-body"><h3 class="blog-card-title">' + toTitleCase(slug) + '</h3></div>';
        container.appendChild(card);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    renderBlogs(blogSlugs);
});
